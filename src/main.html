<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/public.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SysMon</title>
    <script type="module" src="main.js" defer></script>
  </head>
  <body data-theme="light">
    <div class="monitor-panel">
      <div class="row">
        <div class="metric compact">上传: <span class="value" id="net-up-value">0 KB/s</span></div>
        <div class="metric compact">下载: <span class="value" id="net-down-value">0 KB/s</span></div>
      </div>
      <div class="row">
        <div class="metric compact">CPU: <span class="value" id="cpu-value">0%</span></div>
        <div class="metric compact">内存: <span class="value" id="mem-value">0%</span></div>
      </div>
    </div>
    <div class="drag-overlay" data-tauri-drag-region></div>
    <div class="context-menu" id="context-menu" style="display:none;">
      <div class="ctx-item" data-action="taskbar">
        <span class="check"></span>
        <span class="label">任务栏显示</span>
      </div>
      <div class="ctx-sep"></div>
      <div class="ctx-item" data-action="settings">
        <span class="label">设置</span>
      </div>
    </div>
  </body>
</html>
